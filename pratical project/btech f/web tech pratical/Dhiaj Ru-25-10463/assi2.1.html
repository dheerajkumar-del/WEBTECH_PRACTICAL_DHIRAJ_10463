<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>

    <style>
        body{
            margin:0;
            padding:0;
            background:#e8e8e8;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial;
        }

        .card{
            width:350px;
            background:white;
            border-radius:18px;
            padding:90px 20px 30px 20px; /* More space for bigger image */
            position: relative;
            text-align:center;
            box-shadow:0px 4px 20px rgba(0,0,0,0.1);
        }

        /* ⭐ Bigger Profile Image */
        .profile-img{
            width:170px;   /* Increased size */
            height:170px;  /* Increased size */
            border-radius:50%;
            object-fit:cover;
            border:6px solid white;
            position:absolute;
            top:-85px;   /* Adjusted for bigger image */
            left:50%;
            transform:translateX(-50%);
            box-shadow:0 4px 18px rgba(0,0,0,0.25);
        }

        input{
            padding:10px;
            width:80%;
            border-radius:6px;
            border:1px solid #ccc;
            margin-top:10px;
        }

        button{
            margin-top:18px;
            padding:12px 25px;
            background:#00a8ff;
            color:white;
            border:none;
            border-radius:25px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#0088cc;
        }

    </style>
</head>

<body>

    <div class="card">

        <img src="dhiraj.jpg" class="profile-img">

        <h2>Dhiraj Kumar</h2>
        <p>Web Developer| Designer|coder</p>

        <input type="text" placeholder="Type here...">

        <button>Follow</button>

    </div>

</body>
</html>
